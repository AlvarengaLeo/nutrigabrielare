<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmación de orden — Majes de Sivar</title>
</head>
<body style="margin:0;padding:0;background-color:#F5F0EB;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F5F0EB;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <!-- Container -->
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color:#1A1A1A;padding:36px 40px;">
              <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;color:#9fc2ff;letter-spacing:0.08em;text-transform:uppercase;">
                Majes de Sivar
              </p>
              <p style="margin:8px 0 0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;color:#888888;letter-spacing:0.2em;text-transform:uppercase;">
                El Salvador
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color:#ffffff;padding:48px 40px 40px;">

              <!-- Symbol -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:24px;">
                    <span style="font-size:28px;color:#9fc2ff;">&#10022;</span>
                  </td>
                </tr>
              </table>

              <!-- Heading -->
              <h1 style="margin:0 0 8px;font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:700;color:#1A1A1A;text-align:center;">
                ¡Gracias por tu compra, Maje!
              </h1>
              <p style="margin:0 0 32px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;color:#666666;text-align:center;">
                Tu orden ha sido confirmada
              </p>

              <!-- Tracking box -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F5F0EB;border-radius:10px;margin-bottom:32px;">
                <tr>
                  <td style="padding:28px 32px;text-align:center;">
                    <p style="margin:0 0 10px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;color:#888888;letter-spacing:0.2em;text-transform:uppercase;">
                      Tu Tracking Number
                    </p>
                    <p style="margin:0 0 20px;font-family:'Courier New',Courier,monospace;font-size:22px;font-weight:700;color:#1A1A1A;letter-spacing:0.1em;">
                      {{trackingCode}}
                    </p>
                    <a href="#" style="display:inline-block;background-color:#1A1A1A;color:#F5F0EB;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:700;text-decoration:none;padding:12px 28px;border-radius:8px;letter-spacing:0.05em;">
                      Rastrear pedido &rarr;
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Order details -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="padding-bottom:12px;">
                    <p style="margin:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:10px;font-weight:700;color:#888888;letter-spacing:0.2em;text-transform:uppercase;">
                      Detalle de tu Orden
                    </p>
                  </td>
                </tr>
                <tr>
                  <td style="padding-bottom:16px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;color:#333333;line-height:1.7;">
                    {{items}}
                  </td>
                </tr>
                <tr>
                  <td style="border-top:1px solid #E5E0DB;padding-top:16px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;font-weight:700;color:#1A1A1A;">
                          Total:
                        </td>
                        <td align="right" style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;font-weight:700;color:#1A1A1A;">
                          {{total}}
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="background-color:#F5F0EB;padding:28px 40px;border-top:1px solid #E5E0DB;">
              <p style="margin:0 0 10px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:#1A1A1A;letter-spacing:0.05em;">
                Majes de Sivar &middot; El Salvador
              </p>
              <p style="margin:0;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;color:#888888;letter-spacing:0.05em;">
                Instagram &middot; Facebook &middot; TikTok
              </p>
            </td>
          </tr>

        </table>
        <!-- /Container -->

      </td>
    </tr>
  </table>
  <!-- /Wrapper -->

</body>
</html>
